<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GREEN-API Test Task</title>
    <style>
        body { font-family: sans-serif; display: flex; padding: 20px; gap: 20px; }
        .controls { width: 40%; display: flex; flex-direction: column; gap: 15px; }
        .response { width: 60%; }
        input, button, textarea { width: 100%; padding: 8px; box-sizing: border-box; }
        textarea { height: 500px; font-family: monospace; background: #f9f9f9; }
        .group { border: 1px solid #ccc; padding: 10px; border-radius: 5px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        button { cursor: pointer; background-color: #f0f0f0; border: 1px solid #777; margin-top: 5px; }
        button:hover { background-color: #e0e0e0; }
    </style>
</head>
<body>

    <div class="controls">
        <div class="group">
            <input type="text" id="idInstance" placeholder="idInstance" required>
            <input type="text" id="apiTokenInstance" placeholder="ApiTokenInstance" style="margin-top:5px;" required>
        </div>

        <button onclick="getSettings()">getSettings</button>
        <button onclick="getStateInstance()">getStateInstance</button>

        <div class="group">
            <label>Отправка сообщения</label>
            <input type="text" id="phoneMessage" placeholder="77771234567">
            <textarea id="textMessage" style="height: 60px; margin-top:5px;" placeholder="Hello World!"></textarea>
            <button onclick="sendMessage()">sendMessage</button>
        </div>

        <div class="group">
            <label>Отправка файла по URL</label>
            <input type="text" id="phoneFile" placeholder="77771234567">
            <input type="text" id="fileUrl" style="margin-top:5px;" placeholder="https://mysite.com/img.png">
            <button onclick="sendFileByUrl()">sendFileByUrl</button>
        </div>
    </div>

    <div class="response">
        <label>Ответ:</label>
        <textarea id="responseLog" readonly></textarea>
    </div>

    <script>
        // Функция для вывода результата в поле "Ответ"
        function logResponse(data) {
            const logField = document.getElementById('responseLog');
            logField.value = JSON.stringify(data, null, 4);
        }

        // Вспомогательная функция для получения настроек доступа
        function getCredentials() {
            return {
                id: document.getElementById('idInstance').value,
                token: document.getElementById('apiTokenInstance').value
            };
        }

        // 1. Метод getSettings [cite: 7]
        async function getSettings() {
            const { id, token } = getCredentials();
            const url = `https://4100.api.green-api.com$4100621940/getSettings/$3905565c604a459bb4c5c0e3cee4c6cab3f0ec34e4904c61b3`;
            try {
                const response = await fetch(url);
                const result = await response.json();
                logResponse(result);
            } catch (error) { logResponse({ error: error.message }); }
        }

        // 2. Метод getStateInstance [cite: 8]
        async function getStateInstance() {
            const { id, token } = getCredentials();
            const url = `https://4100.api.green-api.com$4100621940/getStateInstance/$3905565c604a459bb4c5c0e3cee4c6cab3f0ec34e4904c61b3`;
            try {
                const response = await fetch(url);
                const result = await response.json();
                logResponse(result);
            } catch (error) { logResponse({ error: error.message }); }
        }

        // 3. Метод sendMessage [cite: 9]
        async function sendMessage() {
            const { id, token } = getCredentials();
            const chatId = `${document.getElementById('phoneMessage').value}@c.us`;
            const message = document.getElementById('textMessage').value;
            const url = `https://4100.api.green-api.com$4100621940/sendMessage/$3905565c604a459bb4c5c0e3cee4c6cab3f0ec34e4904c61b3`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chatId, message })
                });
                const result = await response.json();
                logResponse(result);
            } catch (error) { logResponse({ error: error.message }); }
        }

        // 4. Метод sendFileByUrl [cite: 10]
        async function sendFileByUrl() {
            const { id, token } = getCredentials();
            const chatId = `${document.getElementById('phoneFile').value}@c.us`;
            const urlFile = document.getElementById('fileUrl').value;
            // Извлекаем имя файла из URL
            const fileName = urlFile.substring(urlFile.lastIndexOf('/') + 1);
            const url = `https://4100.api.green-api.com$4100621940/sendFileByUrl/$3905565c604a459bb4c5c0e3cee4c6cab3f0ec34e4904c61b3`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chatId, urlFile, fileName })
                });
                const result = await response.json();
                logResponse(result);
            } catch (error) { logResponse({ error: error.message }); }
        }
    </script>
</body>
</html>
