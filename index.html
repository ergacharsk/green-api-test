<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GREEN-API Telegram Test</title>
    <style>
        body { font-family: sans-serif; display: flex; padding: 20px; gap: 20px; }
        .controls { width: 40%; display: flex; flex-direction: column; gap: 15px; }
        .response { width: 60%; }
        input, button, textarea { width: 100%; padding: 8px; box-sizing: border-box; }
        textarea { height: 500px; font-family: monospace; background: #f9f9f9; }
        .group { border: 1px solid #ccc; padding: 10px; border-radius: 5px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        button { cursor: pointer; background-color: #f0f0f0; border: 1px solid #777; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="controls">
        <div class="group">
            <input type="text" id="idInstance" placeholder="idInstance" style="margin-top:5px;">
            <input type="text" id="apiTokenInstance" placeholder="ApiTokenInstance" style="margin-top:5px;">
        </div>

        <button onclick="callGetMethod('getSettings')">getSettings</button>
        <button onclick="callGetMethod('getStateInstance')">getStateInstance</button>

        <div class="group">
            <label>Отправка сообщения (Telegram)</label>
            <input type="text" id="chatIdMessage" placeholder="77771234567">
            <textarea id="textMessage" style="height: 60px; margin-top:5px;" placeholder="Текст сообщения"></textarea>
            <button onclick="sendMessage()">sendMessage</button>
        </div>

        <div class="group">
            <label>Отправка файла по URL (Telegram)</label>
            <input type="text" id="chatIdFile" placeholder="77771234567">
            <input type="text" id="fileUrl" style="margin-top:5px;" placeholder="https://mysite.com/img.png">
            <button onclick="sendFileByUrl()">sendFileByUrl</button>
        </div>
    </div>

    <div class="response">
        <label>Ответ:</label>
        <textarea id="responseLog" readonly></textarea>
    </div>

    <script>
        const baseUrl = "https://4100.api.green-api.com";

        function logResponse(data) {
            document.getElementById('responseLog').value = JSON.stringify(data, null, 4);
        }

        function getAuth() {
            return {
                id: document.getElementById('idInstance').value.trim(),
                token: document.getElementById('apiTokenInstance').value.trim()
            };
        }

        async function callGetMethod(method) {
            const { id, token } = getAuth();
            const url = `${baseUrl}/waInstance${id}/${method}/${token}`;
            try {
                const response = await fetch(url);
                const result = await response.json();
                logResponse(result);
            } catch (e) { logResponse({ error: e.message }); }
        }

        async function sendMessage() {
            const { id, token } = getAuth();
            const inputPhone = document.getElementById('chatIdMessage').value.trim();
            
            // Формируем корректный chatId для Telegram
            const chatId = inputPhone.includes('@') ? inputPhone : `${inputPhone}@c.us`;
            const message = document.getElementById('textMessage').value;
            const url = `${baseUrl}/waInstance${id}/sendMessage/${token}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        chatId: chatId, 
                        message: message 
                    })
                });
                const result = await response.json();
                logResponse(result);
            } catch (e) { logResponse({ error: e.message }); }
        }

        async function sendFileByUrl() {
            const { id, token } = getAuth();
            const inputPhone = document.getElementById('chatIdFile').value.trim();
            
            const chatId = inputPhone.includes('@') ? inputPhone : `${inputPhone}@c.us`;
            const urlFile = document.getElementById('fileUrl').value.trim();
            const fileName = urlFile.substring(urlFile.lastIndexOf('/') + 1) || "file";
            const url = `${baseUrl}/waInstance${id}/sendFileByUrl/${token}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        chatId: chatId, 
                        urlFile: urlFile, 
                        fileName: fileName 
                    })
                });
                const result = await response.json();
                logResponse(result);
            } catch (e) { logResponse({ error: e.message }); }
        }
    </script>
</body>
</html>
